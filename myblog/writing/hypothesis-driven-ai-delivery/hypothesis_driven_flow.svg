<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Step 1: Strategic Goal -->
  <rect x="60" y="20" width="400" height="80" rx="8" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="260" y="52" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Strategic Goal</text>
  <text x="260" y="76" text-anchor="middle" fill="#a0a0b8" font-size="12">What business outcome are we trying to move?</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="100" x2="260" y2="140" stroke="#555" stroke-width="2"/>
  <polygon points="252,134 260,146 268,134" fill="#555"/>

  <!-- Step 2: Structured Envisioning -->
  <rect x="60" y="146" width="400" height="80" rx="8" fill="#16213e" filter="url(#shadow)"/>
  <text x="260" y="178" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Structured Envisioning</text>
  <text x="260" y="202" text-anchor="middle" fill="#a0a0b8" font-size="12">Shared understanding before anyone writes code</text>

  <!-- Arrow 2 -->
  <line x1="260" y1="226" x2="260" y2="266" stroke="#555" stroke-width="2"/>
  <polygon points="252,260 260,272 268,260" fill="#555"/>

  <!-- Step 3: Explicit Unknowns -->
  <rect x="60" y="272" width="400" height="80" rx="8" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="260" y="304" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Explicit Unknowns (Hypotheses)</text>
  <text x="260" y="328" text-anchor="middle" fill="#a0a0b8" font-size="12">Separate what we know from what we're guessing</text>

  <!-- Arrow 3 -->
  <line x1="260" y1="352" x2="260" y2="392" stroke="#555" stroke-width="2"/>
  <polygon points="252,386 260,398 268,386" fill="#555"/>

  <!-- Step 4: Experimentation -->
  <rect x="60" y="398" width="400" height="80" rx="8" fill="#16213e" filter="url(#shadow)"/>
  <text x="260" y="430" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Experimentation</text>
  <text x="260" y="454" text-anchor="middle" fill="#a0a0b8" font-size="12">Validate or invalidate before committing to build</text>

  <!-- Arrow 4 -->
  <line x1="260" y1="478" x2="260" y2="518" stroke="#555" stroke-width="2"/>
  <polygon points="252,512 260,524 268,512" fill="#555"/>

  <!-- Step 5: MVP -->
  <rect x="60" y="524" width="400" height="80" rx="8" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="260" y="556" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">MVP (Build the Validated Thing)</text>
  <text x="260" y="580" text-anchor="middle" fill="#a0a0b8" font-size="12">Engineering investment is de-risked</text>
</svg>
